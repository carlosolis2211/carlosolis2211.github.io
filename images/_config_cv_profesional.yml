        quote: >
          Desktop cybersecurity tool for monitoring devices, ports, traffic, and access control in a home network.
        description: |
          Developed the frontend of a desktop application using <mark>Electron</mark>, <mark>JavaScript</mark>, <mark>Firebase Authentication</mark>, and API integration with a <mark>Flask</mark> backend. The system includes user authentication, device authorization, network device listing, port scanning integration, traffic monitoring views, dark/light theme, and router credential management.

          This project helped me strengthen my skills in frontend architecture, REST API consumption, authentication flows, Git workflows, desktop app packaging, and network/cybersecurity fundamentals.

      - layout: top-middle
        title: CityWalk — Smart Mobility Tourism App
        # link: https://github.com/TU_USUARIO/TU_REPO_CITYWALK
        # link_text: View Project
        quote: >
          Mobile app concept for cultural and scenic route generation in Guadalajara.
        description: |
          Built a mobile application prototype with <mark>React Native</mark> and <mark>Expo</mark> focused on smart tourism and urban mobility. The app includes map-based navigation, location permission flow, cultural points of interest, route generation concepts, visit tracking, and user settings.

          The project was developed as part of a Smart Mobility challenge, including a white paper, presentation, prototype, and technical implementation.

      - layout: top-middle
        title: Predictive Logistics and Global Inventory Management
        # link: https://github.com/TU_USUARIO/TU_REPO_LOGISTICS
        # link_text: View Project
        quote: >
          Data and AI project for logistics analysis using clustering, neural networks, and route optimization concepts.
        description: |
          Developed an academic AI project in <mark>MATLAB</mark> using logistics and warehouse data. The project included <mark>K-Means clustering</mark> for grouping operational patterns, <mark>MLP neural networks</mark> for prediction, and <mark>Ant Colony Optimization</mark> concepts for route optimization.

          I also worked on the documentation, methodology, results analysis, and a visual interface using MATLAB App Designer.

      - layout: top-middle
        title: AI and Machine Learning Academic Projects
        quote: >
          Collection of practical exercises involving supervised and unsupervised learning algorithms.
        description: |
          Implemented and analyzed machine learning models such as <mark>Perceptron</mark>, <mark>Adaline</mark>, <mark>Logistic Regression</mark>, <mark>KNN</mark>, <mark>K-Means</mark>, <mark>MLP</mark>, <mark>RBF networks</mark>, and <mark>CNN transfer learning</mark>. These projects helped me build a stronger understanding of model training, evaluation, classification, clustering, and data visualization.

