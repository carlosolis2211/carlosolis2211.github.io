about_content: |
  I am a Computer Science student focused on software development, backend systems, QA automation, and applied artificial intelligence. I enjoy building practical projects that combine clean interfaces, data processing, automation, and real-world problem solving.

  I have worked with <mark>Python</mark>, <mark>JavaScript</mark>, <mark>React Native</mark>, <mark>Electron</mark>, <mark>Flask</mark>, <mark>Firebase</mark>, <mark>MATLAB</mark>, <mark>Docker</mark>, <mark>Git/GitHub</mark>, and basic cybersecurity/networking tools such as <mark>Nmap</mark> and <mark>PowerShell</mark>.

  I am currently looking for internship or entry-level opportunities in <mark>Software Development</mark>, <mark>Backend</mark>, <mark>QA/Test Automation</mark>, <mark>Data/AI</mark>, or <mark>IT Automation</mark>.

